<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Verify Your Email - Jobsynk AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      background-color: #f4f4f7;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
    }
    .wrapper {
      width: 100%;
      padding: 24px 0;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
      background-color: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.12);
      padding: 32px 28px;
    }
    .logo {
      text-align: center;
      font-weight: 700;
      font-size: 20px;
      color: #111827;
      letter-spacing: 0.04em;
      margin-bottom: 16px;
    }
    .title {
      font-size: 20px;
      font-weight: 600;
      color: #111827;
      margin: 0 0 8px;
      text-align: center;
    }
    .subtitle {
      font-size: 14px;
      color: #6b7280;
      margin: 0 0 24px;
      text-align: center;
    }
    .code-badge {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 999px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #ffffff;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-align: center;
      margin: 0 auto 16px;
    }
    .section {
      font-size: 13px;
      color: #4b5563;
      line-height: 1.6;
      margin-bottom: 16px;
      text-align: center;
    }
    .muted {
      font-size: 12px;
      color: #9ca3af;
      text-align: center;
      margin-top: 8px;
    }
    .footer {
      font-size: 11px;
      color: #9ca3af;
      text-align: center;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="container">
      <div class="logo">Jobsynk AI</div>
      <h1 class="title">Verify your email</h1>
      <p class="subtitle">Enter this code to complete your registration.</p>

      <div style="text-align: center;">
        <div class="code-badge">
          {{OTP_CODE}}
        </div>
      </div>

      <p class="section">
        This code will expire in 60 seconds. For your security, do not share it with anyone.
      </p>

      <p class="muted">
        If you did not create an account, you can safely ignore this email.
      </p>

      <div class="footer">
        &copy; 2025 Jobsynk AI. All rights reserved.
      </div>
    </div>
  </div>
</body>
</html>
