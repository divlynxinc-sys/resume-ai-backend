# Build from the Dockerfile (Playwright base image with Chromium) instead of
# nixpacks. The HTML->PDF export endpoint needs a real browser at runtime, which
# the nixpacks Python build did not provide.
[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# No startCommand here: it would override the Dockerfile's CMD and, on a
# Dockerfile build, Railway runs it without a shell — so "$PORT" would be passed
# literally and uvicorn would crash ("Invalid value for '--port': '$PORT'"). The
# Dockerfile's own CMD runs via `sh -c` and expands $PORT correctly.
healthcheckPath = "/"
