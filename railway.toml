# Build from the Dockerfile (Playwright base image with Chromium) instead of
# nixpacks. The HTML->PDF export endpoint needs a real browser at runtime, which
# the nixpacks Python build did not provide.
[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/"
