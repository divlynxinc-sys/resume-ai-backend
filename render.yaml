databases:
  - name: resumeai-db
    plan: free
    databaseName: resume_ai

services:
  - type: web
    name: resumeai-api
    runtime: python
    plan: free

    # NOTE: PDF export renders HTML with headless Chromium (Playwright). The
    # browser + its shared libraries must be present at runtime. `--with-deps`
    # needs apt/root; on slim/free runtimes prefer a Docker deploy based on
    # mcr.microsoft.com/playwright/python. Chromium also needs ~300MB+ RAM, so
    # the free 512MB plan may OOM under concurrent exports.
    buildCommand: pip install -r requirements.txt && python -m playwright install --with-deps chromium
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    # Migrations run automatically at app startup (see app/main.py lifespan)

    healthCheckPath: /

    envVars:
      - key: APP_ENV
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: resumeai-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: REFRESH_TOKEN_EXPIRE_MINUTES
        value: "43200"
      # Optional: add CORS_ORIGINS in Render Dashboard for your frontend URL(s)
