databases:
  - name: resumeai-db
    plan: free
    databaseName: resume_ai

services:
  - type: web
    name: resumeai-api
    runtime: python
    plan: free

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    preDeployCommand: python -m alembic upgrade head

    healthCheckPath: /

    envVars:
      - key: APP_ENV
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: resumeai-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: REFRESH_TOKEN_EXPIRE_MINUTES
        value: "43200"
      # Optional: add CORS_ORIGINS in Render Dashboard for your frontend URL(s)
